<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 234 60"
  width="234"
  height="60"
  role="img"
  aria-labelledby="banner-title banner-desc"
>
  <title id="banner-title">Aoi.Kagase Works</title>
  <!-- 背景 -->
  <rect x="0" y="0" width="234" height="60" fill="#fff" stroke="#000" stroke-width="1"/>

  <defs>
    <!-- ギア定義 -->
    <g id="gear-spoke">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
      <g>
        <rect x="-1" y="-14" width="2" height="4" fill="none" stroke="#000" stroke-width="1.5"/>
      </g>
      <g>
        <rect x="-0.7" y="-7" width="1.4" height="7" fill="none" stroke="#000" stroke-width="0.8"/>
        <rect x="-0.7" y="-7" width="1.4" height="7" fill="none" stroke="#000" stroke-width="0.8" transform="rotate(90)"/>
        <rect x="-0.7" y="-7" width="1.4" height="7" fill="none" stroke="#000" stroke-width="0.8" transform="rotate(45)"/>
        <rect x="-0.7" y="-7" width="1.4" height="7" fill="none" stroke="#000" stroke-width="0.8" transform="rotate(-45)"/>
      </g>
      <circle cx="0" cy="0" r="2" fill="none" stroke="#000" stroke-width="0.8"/>
    </g>

    <g id="gear-tri">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#000" stroke-width="1.5"/>
      <g>
        <polygon points="0,-10 1.5,-13 -1.5,-13" fill="none" stroke="#000" stroke-width="1.5"/>
      </g>
      <circle cx="0" cy="0" r="1.5" fill="none" stroke="#000" stroke-width="0.8"/>
    </g>

    <g id="gear-hole">
      <circle cx="0" cy="0" r="9" fill="none" stroke="#000" stroke-width="1.5"/>
      <g>
        <polygon points="0,-11 1,-14 -1,-14" fill="none" stroke="#000" stroke-width="1.5"/>
      </g>
      <circle cx="0" cy="0" r="1.5" fill="none" stroke="#000" stroke-width="0.8"/>
    </g>

    <!-- 両端ギアに重なる太い連結アーム -->
    <g id="link-arm">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#000" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="2" fill="#fff" stroke="#000" stroke-width="1"/>
      <circle cx="20" cy="0" r="2" fill="#fff" stroke="#000" stroke-width="1"/>
    </g>

    <!-- 長い連結アーム（上下シャフト用） -->
    <g id="link-arm-long">
      <line x1="0" y1="0" x2="35" y2="0" stroke="#000" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="2" fill="#fff" stroke="#000" stroke-width="1"/>
      <circle cx="35" cy="0" r="2" fill="#fff" stroke="#000" stroke-width="1"/>
    </g>
  </defs>

  <!-- ギア配置（左寄せ） -->
  <g id="gears">
    <g transform="translate(20,30)"><use href="#gear-spoke"/></g>
    <g transform="translate(45,15)"><use href="#gear-hole"/></g>
    <g transform="translate(45,45)"><use href="#gear-tri"/></g>
    <g transform="translate(5,15)"><use href="#gear-tri"/></g>
    <g transform="translate(5,45)"><use href="#gear-hole"/></g>
    <g transform="translate(70,30)"><use href="#gear-spoke"/></g>
    <g transform="translate(70,10) scale(0.6)"><use href="#gear-tri"/></g>
    <g transform="translate(70,50) scale(0.6)"><use href="#gear-hole"/></g>
  </g>

  <!-- 連結アーム -->
  <g id="arms">
    <!-- 通常アーム -->
    <g transform="translate(20,30) rotate(-20)"><use href="#link-arm"/></g>
    <g transform="translate(20,30) rotate(20)"><use href="#link-arm"/></g>
    <g transform="translate(20,30) rotate(-60)"><use href="#link-arm"/></g>
    <g transform="translate(20,30) rotate(60)"><use href="#link-arm"/></g>

    <g transform="translate(45,15) rotate(30)"><use href="#link-arm"/></g>
    <g transform="translate(45,45) rotate(-30)"><use href="#link-arm"/></g>
    <g transform="translate(70,30) rotate(10)"><use href="#link-arm"/></g>
    <g transform="translate(5,15) rotate(-10)"><use href="#link-arm"/></g>
  </g>

  <!-- タイトルと下線 -->
  <text x="220" y="50" text-anchor="end" font-family="'Noto Sans JP', 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" fill="#000">
    Aoi.Kagase Works
  </text>
  <line x1="0" y1="55" x2="250" y2="55" stroke="#000" stroke-width="1.5"/>
</svg>